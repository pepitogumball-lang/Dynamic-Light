name: Build Minecraft Addon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Manifests
        run: |
          if [ ! -f Behavior_Pack/manifest.json ]; then echo "Error: BP manifest missing"; exit 1; fi
          if [ ! -f Resource_Pack/manifest.json ]; then echo "Error: RP manifest missing"; exit 1; fi

      - name: Create .mcaddon
        run: |
          mkdir -p build
          # Crear .mcpack para BP
          cd Behavior_Pack && zip -r ../build/DynamicLight_BP.mcpack * && cd ..
          # Crear .mcpack para RP
          cd Resource_Pack && zip -r ../build/DynamicLight_RP.mcpack * && cd ..
          # Crear .mcaddon uniendo ambos
          cd build && zip -r DynamicLight.mcaddon *.mcpack && cd ..

      - name: Upload mcaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: DynamicLight-Release
          path: build/DynamicLight.mcaddon
